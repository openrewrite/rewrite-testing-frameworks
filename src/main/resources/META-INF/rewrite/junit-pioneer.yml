---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.testing.junit6.MigrateJUnitPioneerToJupiter
displayName: Migrate JUnit Pioneer extensions to native JUnit Jupiter equivalents
description: >-
  Migrates `@DefaultLocale`, `@DefaultTimeZone`, `@SetSystemProperty`, `@ClearSystemProperty`,
  `@RestoreSystemProperties` (and their `@Reads.../@Writes...` companions) from JUnit Pioneer
  to the native equivalents added in JUnit Jupiter 6.1. The `junit-pioneer` dependency is
  not removed since other Pioneer features (e.g. `@RetryingTest`, `@CartesianTest`) have no
  Jupiter equivalent.
tags:
  - testing
  - junit
  - jupiter
  - junit-pioneer
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.DefaultLocale
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.DefaultLocale
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.DefaultTimeZone
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.DefaultTimeZone
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.SetSystemProperty
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.SetSystemProperty
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.ClearSystemProperty
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.ClearSystemProperty
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.RestoreSystemProperties
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.RestoreSystemProperties
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.ReadsDefaultLocale
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.ReadsDefaultLocale
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.WritesDefaultLocale
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.WritesDefaultLocale
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.ReadsDefaultTimeZone
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.ReadsDefaultTimeZone
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junitpioneer.jupiter.WritesDefaultTimeZone
      newFullyQualifiedTypeName: org.junit.jupiter.api.util.WritesDefaultTimeZone
